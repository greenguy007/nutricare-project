{% extends 'common.html' %}
{% block content %}

<div class="container d-flex justify-content-center mt-5">
    <div class="card p-4 shadow" style="width:400px;">
        <h4 class="text-center mb-3">OTP Verification</h4>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="text" name="otp" maxlength="6" class="form-control mb-3" placeholder="Enter OTP" required>
            <button type="submit" name="action" value="verify" class="btn btn-success w-100">Verify OTP</button>
            <button type="submit" name="action" value="resend" class="btn btn-outline-secondary w-100 mt-2">Resend OTP</button>
        </form>
    </div>
</div>

{% endblock %}
