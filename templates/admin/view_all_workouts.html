{% extends 'admin/common.html' %}
{% block content %}
<br><br>
<div class="container mt-4">
    <h3 class="mb-4 text-center">All Workout Plans</h3>

    <div class="row">
        {% for w in workouts %}
        <div class="col-md-4 mb-4">
            <div style="border:1px solid lightgray; border-radius:10px; padding:15px; background:white; height:100%;">

                <img src="{{ w.image.url }}" style="width:100%; height:200px; object-fit:cover; border-radius:10px;">

                <h5 class="mt-3">{{ w.title }}</h5>

                <p style="font-size:14px;">
                    {{ w.description|truncatewords:15 }}
                </p>

                <p>
                    <b>Dietician:</b> {{ w.dietician.full_name }}
                </p>

                <a href="{% url 'view_workout_details' w.id %}"
                   class="btn btn-primary btn-sm w-100">
                   View Details
                </a>

            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center">
            <p>No workout plans found</p>
        </div>
        {% endfor %}
    </div>
</div>
<br><br>
{% endblock %}
