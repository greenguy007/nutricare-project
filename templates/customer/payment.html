{% extends 'customer/common.html' %}
{% block content %}

<div class="site-main">
    <section class="ttm-row clearfix">
        <div class="container">

            <div class="row justify-content-center">
                <div class="col-md-5 col-sm-10">

                    <div style="background:white; padding:25px; border-radius:12px; box-shadow:0 0 15px lightgray;">

                        <h4 class="text-center mb-3">Secure Payment</h4>

                        <!-- Plan Details -->
                        <div style="background:#f5f5f5; padding:10px; border-radius:8px; margin-bottom:15px;">
                            <p style="margin:0;"><b>Plan:</b> {{ plan.plan_name }}</p>
                            <p style="margin:0;"><b>Amount:</b> ₹{{ plan.price }}</p>
                        </div>

                        <!-- Payment Form -->
                        <form method="post" onsubmit="return validateCard()">
                            {% csrf_token %}

                            <!-- Card Number -->
                            <div class="mb-3">
                                <input type="text" id="card" name="card"
                                       class="form-control"
                                       placeholder="Card Number (16 digits)" required>
                            </div>

                            <!-- Name -->
                            <div class="mb-3">
                                <input type="text" id="name" name="name"
                                       class="form-control"
                                       placeholder="Card Holder Name" required>
                            </div>

                            <!-- CVV + Expiry -->
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <input type="text" id="cvv" name="cvv"
                                           class="form-control"
                                           placeholder="CVV" required>
                                </div>

                                <div class="col-6 mb-3">
                                    <input type="month" id="expiry" name="expiry"
                                           class="form-control" required>
                                </div>
                            </div>

                            <!-- Notes -->
                            {% if action == 'request' %}
                            <div class="mb-3">
                                <textarea name="notes"
                                          class="form-control"
                                          rows="3"
                                          placeholder="Enter your request"></textarea>
                            </div>
                            {% endif %}

                            <!-- Submit -->
                            <button type="submit"
                                    class="btn btn-success w-100"
                                    style="border-radius:8px;">
                                Pay Now
                            </button>

                        </form>

                    </div>

                </div>
            </div>

        </div>
    </section>
</div>

<!-- JS Validation -->
<script>
function validateCard() {
    let card = document.getElementById('card').value.trim();
    let cvv = document.getElementById('cvv').value.trim();
    let expiry = document.getElementById('expiry').value;

    // Card validation
    if (!/^\d{16}$/.test(card)) {
        alert("Card number must be exactly 16 digits");
        return false;
    }

    // CVV validation
    if (!/^\d{3}$/.test(cvv)) {
        alert("CVV must be exactly 3 digits");
        return false;
    }

    // Expiry validation
    let today = new Date();
    let expDate = new Date(expiry);

    if (expDate <= today) {
        alert("Card expiry must be a future date");
        return false;
    }

    return true;
}
</script>

{% endblock %}
