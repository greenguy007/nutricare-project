{% extends 'customer/common.html' %}
{% block content %}

<style>
.chat-container {
    max-width: 800px;
    margin: 20px auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    height: 75vh;
}

.chat-header {
    padding: 15px;
    background: #2c7be5;
    color: white;
    font-size: 18px;
    font-weight: bold;
    border-radius: 10px 10px 0 0;
}

.chat-body {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #f4f6f9;
}

.message {
    max-width: 70%;
    padding: 10px 14px;
    margin-bottom: 10px;
    border-radius: 10px;
    word-wrap: break-word;
    font-size: 15px;
}

.me {
    background: #d1e7ff;
    margin-left: auto;
    text-align: right;
}

.other {
    background: #ffffff;
    margin-right: auto;
    text-align: left;
}

.sender-name {
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 3px;
    display: block;
    color: #555;
}

.chat-footer {
    padding: 12px;
    border-top: 1px solid #ddd;
    display: flex;
    gap: 10px;
}

.chat-footer input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
}

.chat-footer button {
    padding: 10px 18px;
    border: none;
    background: #2c7be5;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

.chat-footer button:hover {
    background: #1a5dcc;
}

/* Responsive */
@media (max-width: 600px) {
    .chat-container {
        height: 85vh;
        margin: 10px;
    }

    .message {
        max-width: 85%;
        font-size: 14px;
    }
}
</style>

<div class="chat-container">
    <div class="chat-header">
        Chat with {{ receiver.username }}
    </div>

    <div class="chat-body">
        {% for c in chats %}
            {% if c.sender.id == login_id %}
                <div class="message me">
                    <span class="sender-name">You</span>
                    {{ c.message }}
                </div>
            {% else %}
                <div class="message other">
                    <span class="sender-name">{{ receiver.username }}</span>
                    {{ c.message }}
                </div>
            {% endif %}
        {% endfor %}
    </div>

    <form method="post" class="chat-footer">
        {% csrf_token %}
        <input type="text" name="message" placeholder="Type your message..." required>
        <button type="submit">Send</button>
    </form>
</div>

{% endblock %}
