{% extends 'customer/common.html' %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">
    <div class="card p-4" style="width: 400px;">
        <h4 class="text-center mb-3">Add BMI</h4>

        {% if bmi_status %}
            <div class="alert alert-info text-center">
                Your BMI: {{ bmi_value }} <br>
                Status: {{ bmi_status }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="number" step="0.1" name="height_cm" placeholder="Height (cm)" class="form-control mb-2" required>
            <input type="number" step="0.1" name="weight_kg" placeholder="Weight (kg)" class="form-control mb-2" required>
            <button class="btn btn-success w-100">Calculate & Save</button>
        </form>
    </div>
</div>

{% endblock %}
