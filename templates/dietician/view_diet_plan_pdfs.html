{% extends 'dietician/common.html' %}
{% block content %}
<br>
<div class="container">
    <h3 class="mb-3">My Diet Plan PDFs</h3>

    <table class="table table-bordered text-center">
        <thead>
            <tr>
                <th>#</th>
                <th>Title</th>
                <th>PDF</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for p in pdfs %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ p.title }}</td>
                <td>
                    <a href="{{ p.pdf_file.url }}" target="_blank" class="btn btn-sm btn-primary">
                        View
                    </a>
                </td>
                <td>{{ p.uploaded_at|date:"d-m-Y" }}</td>
                <td>
                    <a href="{% url 'dietician_edit_pdf' p.id %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'dietician_delete_pdf' p.id %}"
                       onclick="return confirm('Are you sure?')"
                       class="btn btn-sm btn-danger">
                       Delete
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">No PDFs uploaded</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<br>
{% endblock %}
