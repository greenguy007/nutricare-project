{% extends 'dietician/common.html' %}
{% block content %}

<div class="container">
    <h3>Create Custom Diet Plan</h3>

    <p><strong>Customer:</strong> {{ diet_request.customer.full_name }}</p>
    <p><strong>Notes:</strong> {{ diet_request.notes }}</p>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Plan Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>

        <div class="form-group mt-3">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="4" required></textarea>
        </div>

        <div class="form-group mt-3">
            <label>Diet Steps</label>

            <div id="steps-container">
                <textarea name="steps" class="form-control mb-2" placeholder="Step 1"></textarea>
            </div>

            <button type="button" class="btn btn-secondary btn-sm mt-2"
                    onclick="addStep()">
                + Add Step
            </button>
        </div>

        <button type="submit" class="btn btn-success mt-3">
            Create Custom Plan
        </button>
    </form>
</div>

<script>
function addStep() {
    const container = document.getElementById('steps-container');
    const textarea = document.createElement('textarea');
    textarea.name = 'steps';
    textarea.className = 'form-control mb-2';
    textarea.placeholder = 'Next Step';
    container.appendChild(textarea);
}
</script>

{% endblock %}
