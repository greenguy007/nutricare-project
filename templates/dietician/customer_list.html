{% extends 'dietician/common.html' %}
{% block content %}

<style>
.customer-container {
    max-width: 900px;
    margin: auto;
}

.customer-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: white;
    padding: 15px 20px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    flex-wrap: wrap;
}

.customer-left {
    display: flex;
    align-items: center;
    gap: 15px;
}

.customer-left img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #4CAF50;
}

.customer-name {
    font-size: 18px;
    font-weight: 600;
}

.chat-btn {
    padding: 10px 18px;
    background: #4CAF50;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
}

.chat-btn:hover {
    background: #43a047;
}

@media (max-width: 600px) {
    .customer-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
    }

    .chat-btn {
        width: 100%;
        text-align: center;
    }
}
</style>

<div class="customer-container">
    <h3 style="margin-bottom:20px;">Customers</h3>

    {% for c in customers %}
    <div class="customer-card">
        <div class="customer-left">
            <img src="{{ c.image.url }}">
            <div class="customer-name">{{ c.full_name }}</div>
        </div>

        <a href="{% url 'dietician_chat' c.id %}" class="chat-btn">
            Chat
        </a>
    </div>
    {% endfor %}
</div>

{% endblock %}
