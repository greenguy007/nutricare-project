{% extends 'dietician/common.html' %}
{% block content %}

<style>
.chat-container {
    max-width: 800px;
    margin: 20px auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    height: 80vh;
}

.chat-header {
    padding: 15px;
    background: #2c7be5;
    color: white;
    font-size: 18px;
    border-radius: 10px 10px 0 0;
}

.chat-body {
    padding: 15px;
    flex: 1;
    overflow-y: auto;
    background: #f5f7fb;
}

.message {
    max-width: 70%;
    padding: 10px 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    word-wrap: break-word;
    position: relative;
}

.message.you {
    background: #2c7be5;
    color: white;
    margin-left: auto;
    text-align: right;
}

.message.other {
    background: #e4e6eb;
    color: black;
    margin-right: auto;
    text-align: left;
}

.message .sender-name {
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 5px;
}

.chat-footer {
    padding: 10px;
    border-top: 1px solid #ddd;
    display: flex;
    gap: 10px;
}

.chat-footer input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
}

.chat-footer button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #2c7be5;
    color: white;
    cursor: pointer;
}

@media (max-width: 600px) {
    .chat-container {
        height: 90vh;
        margin: 0;
        border-radius: 0;
    }
}
</style>

<div class="chat-container">

    <div class="chat-header">
        Chat with {{ receiver.username }}
    </div>

    <div class="chat-body">
        {% for c in chats %}
            {% if c.sender.id == login_id %}
                <div class="message you">
                    <div class="sender-name">You</div>
                    {{ c.message }}
                </div>
            {% else %}
                <div class="message other">
                    <div class="sender-name">{{ receiver.username }}</div>
                    {{ c.message }}
                </div>
            {% endif %}
        {% endfor %}
    </div>

    <form method="post" class="chat-footer">
        {% csrf_token %}
        <input type="text" name="message" placeholder="Type a message..." required>
        <button type="submit">Send</button>
    </form>

</div>

{% endblock %}
